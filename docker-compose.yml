version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: eyebrow_architect
    ports:
      - "3307:3306" # Use 3307 to avoid conflict with local MySQL

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/eyebrow_architect?serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1234
    depends_on:
      - db

  frontend:
    build: ./Frontend
    ports:
      - "80:80"
    depends_on:
      - backend
